services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: bigdata-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=bigdata-sales
    env_file:
      - ./docker/hadoop.env
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./:/project

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: bigdata-datanode
    restart: unless-stopped
    depends_on:
      - namenode
    env_file:
      - ./docker/hadoop.env
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: bigdata-resourcemanager
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    ports:
      - "8088:8088"
    env_file:
      - ./docker/hadoop.env

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: bigdata-nodemanager
    restart: unless-stopped
    depends_on:
      - resourcemanager
    env_file:
      - ./docker/hadoop.env

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: bigdata-historyserver
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
      - resourcemanager
    ports:
      - "8188:8188"
    env_file:
      - ./docker/hadoop.env
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline

  maven:
    image: maven:3.9.9-eclipse-temurin-8
    working_dir: /project
    volumes:
      - ./:/project
      - maven_repo:/root/.m2

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  maven_repo:
